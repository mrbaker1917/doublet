<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doublet</title>
  <script>
    (function () {
      if (localStorage.getItem("doublet-theme") === "light") {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="web/favicon.ico" type="image/x-icon">
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="header-top">
        <div class="brand">
          <h1>Doublet</h1>
          <p class="tagline">Change one letter at a time. Every step must be a real word.</p>
        </div>
        <div class="header-controls">
          <button
            id="theme-toggle"
            type="button"
            class="theme-toggle"
            aria-label="Switch to light mode"
            title="Switch to light mode"
          >
            <svg class="theme-icon theme-icon--bulb" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="currentColor" d="M12 2a7 7 0 0 0-4 12.7V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.3A7 7 0 0 0 12 2zm-1 18h2v1a1 1 0 0 1-2 0v-1z"/>
            </svg>
            <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <label class="mode-switch" title="Expert mode allows obscure dictionary words">
          <input id="expert-mode" type="checkbox" class="mode-switch-input">
          <span class="mode-switch-track" aria-hidden="true">
            <span class="mode-switch-thumb"></span>
            <span class="mode-switch-label mode-switch-label--left">Casual</span>
            <span class="mode-switch-label mode-switch-label--right">Expert</span>
          </span>
          <span class="mode-switch-sr">Expert mode</span>
          </label>
        </div>
      </div>
      <p id="mode-hint" class="mode-hint">Common words only</p>
    </header>

    <section id="start-screen" class="panel">
      <h2>New challenge</h2>

      <div id="suggestions" class="suggestions" hidden>
        <p class="hint">Try one of these:</p>
        <div class="suggestion-row">
          <button type="button" class="chip chip--easy" data-level="easy">
            <span class="chip-level">Easy</span>
            <span class="chip-pair"></span>
          </button>
          <button type="button" class="chip chip--medium" data-level="medium">
            <span class="chip-level">Medium</span>
            <span class="chip-pair"></span>
          </button>
          <button type="button" class="chip chip--hard" data-level="hard">
            <span class="chip-level">Hard</span>
            <span class="chip-pair"></span>
          </button>
        </div>
      </div>

      <form id="start-form" class="form">
        <label>
          Start word
          <input id="start-input" name="start" type="text" autocomplete="off" spellcheck="false" required>
        </label>
        <label>
          Target word
          <input id="end-input" name="end" type="text" autocomplete="off" spellcheck="false" required>
        </label>
        <label>
          Difficulty
          <select id="difficulty-input" name="difficulty">
            <option value="easy">Easy · extra moves allowed</option>
            <option value="medium" selected>Medium · a little slack</option>
            <option value="hard">Hard · shortest path only</option>
            <option value="custom">Custom</option>
          </select>
        </label>
        <label id="max-label" class="max-label" hidden>
          Max changes
          <input id="max-input" name="max" type="number" min="1" value="3">
        </label>
        <button type="submit" class="btn primary">Start game</button>
      </form>
      <p id="start-error" class="error" role="alert" hidden></p>
    </section>

    <section id="game-screen" class="panel panel--game" hidden>
      <div class="status-bar">
        <div class="status-item">
          <span class="label">Current</span>
          <span id="current-word" class="word current"></span>
        </div>
        <div class="status-item">
          <span class="label">Target</span>
          <span id="target-word" class="word target"></span>
        </div>
        <div class="status-item">
          <span class="label">Moves left</span>
          <span id="moves-left" class="count"></span>
        </div>
      </div>

      <div class="history-wrap">
        <h3>Path so far</h3>
        <p id="history" class="history"></p>
      </div>

      <form id="move-form" class="form inline">
        <label>
          Next word
          <input id="move-input" name="word" type="text" autocomplete="off" spellcheck="false" required>
        </label>
        <button type="submit" class="btn primary">Submit</button>
      </form>
      <div class="game-actions">
        <button id="hint-btn" type="button" class="btn secondary">Hint</button>
        <button id="restart-btn" type="button" class="btn secondary">Restart</button>
        <button id="give-up-btn" type="button" class="btn secondary">Show solution</button>
      </div>
      <p id="move-message" class="message" role="status" hidden></p>
      <p id="game-result" class="result" role="status" hidden></p>
      <div id="solution-wrap" class="solution-wrap" hidden>
        <h3 id="solution-title">Shortest path</h3>
        <p id="solution-path" class="history"></p>
      </div>

      <button id="new-game-btn" type="button" class="btn primary" hidden>Play again</button>
    </section>
  </main>

  <script src="/confetti.js"></script>
  <script src="/app.js"></script>
</body>
</html>
