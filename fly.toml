# fly.toml app configuration file generated for doublet on 2026-06-07T23:00:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'doublet'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
